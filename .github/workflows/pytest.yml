name: tests unitaires
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.10.12"
      - name: Install dependencies
        run: |
          pip3 install pytest
      - name: Run tests
        run: pytest TP1/test.p
